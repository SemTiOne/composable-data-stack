# modules/orchestration/dagster/module.yaml
# yaml-language-server: $schema=../../../schemas/module.schema.json
apiVersion: cds/v1alpha1
kind: Module

metadata:
  name: dagster
  category: orchestration
  version: "0.1.0"
  displayName: Dagster
  description: >
    Dagster orchestration service aligned with the Dagster OSS Docker Compose pattern
    (webserver + daemon), with pluggable storage bindings.

spec:
  runtime:
    type: container
    service:
      name: dagster
      ports:
        - name: http
          containerPort: 3000
          protocol: TCP

  configSchema:
    type: object
    additionalProperties: false
    required:
      - webPort
      - homeDir
      - storage
    properties:
      webPort:
        type: integer
        minimum: 1
        maximum: 65535
        default: 3000

      homeDir:
        type: string
        minLength: 1
        default: /opt/dagster/dagster_home

      daemon:
        type: object
        additionalProperties: false
        default: {}
        properties:
          enabled:
            type: boolean
            default: true

      storage:
        type: object
        additionalProperties: false
        required:
          - runStorage
          - eventLogStorage
          - scheduleStorage
        properties:
          runStorage:
            $ref: "#/$defs/contractBinding"
          eventLogStorage:
            $ref: "#/$defs/contractBinding"
          scheduleStorage:
            $ref: "#/$defs/contractBinding"

      runLauncher:
        type: object
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
              - default
            default: default

      healthcheck:
        type: object
        additionalProperties: false
        default: {}
        properties:
          enabled:
            type: boolean
            default: true

    $defs:
      contractBinding:
        type: object
        additionalProperties: false
        required:
          - contractRef
        properties:
          contractRef:
            type: string
            pattern: "^[a-z0-9-]+\\.[a-z0-9-]+$"

  consumes:
    - name: run-storage
      contract:
        kind: sql-database
      required: true
      mappedFrom: spec.config.storage.runStorage

    - name: event-log-storage
      contract:
        kind: sql-database
      required: true
      mappedFrom: spec.config.storage.eventLogStorage

    - name: schedule-storage
      contract:
        kind: sql-database
      required: true
      mappedFrom: spec.config.storage.scheduleStorage

  provides:
    - name: http-service
      contract:
        kind: http-service
        spec:
          portFrom: spec.config.webPort
          healthPath: /
          protocol: http

  implementation:
    kind: docker-compose
    compose:
      services:
        user-code:
          build:
            context: ../../../
            dockerfile: images/dagster/Dockerfile
          image: local/dagster:custom
          restart: always
          hostname: dagster-user-code
          command:
            - dagster
            - code-server
            - start
            - -h
            - 0.0.0.0
            - -p
            - "4000"
            - -f
            - /app/workdirs/dagster/definitions.py
          healthcheck:
            conditionallyEnabledFrom: spec.config.healthcheck.enabled
            test:
              - CMD
              - dagster
              - api
              - grpc-health-check
              - -h
              - localhost
              - -p
              - "4000"
            interval: 10s
            timeout: 2s
            start_period: 30s
            retries: 3
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - dagster-io-manager-storage:/tmp/io_manager_storage
          environment:
            DAGSTER_HOME: "${config.homeDir}"
            DAGSTER_POSTGRES_HOST: "${bindings.run-storage.host}"
            DAGSTER_POSTGRES_PORT: "${bindings.run-storage.port}"
            DAGSTER_POSTGRES_DB: "${bindings.run-storage.database}"
            DAGSTER_POSTGRES_USER: "${bindings.run-storage.username}"
            DAGSTER_POSTGRES_PASSWORD: "${bindings.run-storage.password}"
            DAGSTER_CURRENT_IMAGE: local/dagster:custom

        dagster-webserver:
          build:
            context: ../../../
            dockerfile: images/dagster/Dockerfile
          image: local/dagster:custom
          restart: always
          depends_on:
            user-code:
              condition: service_healthy
          command:
            - dagster-webserver
            - -h
            - 0.0.0.0
            - -p
            - "3000"
            - -w
            - workspace.yaml
          ports:
            - "${config.webPort}:3000"
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - dagster-io-manager-storage:/tmp/io_manager_storage
          environment:
            DAGSTER_HOME: "${config.homeDir}"
            DAGSTER_POSTGRES_HOST: "${bindings.run-storage.host}"
            DAGSTER_POSTGRES_PORT: "${bindings.run-storage.port}"
            DAGSTER_POSTGRES_DB: "${bindings.run-storage.database}"
            DAGSTER_POSTGRES_USER: "${bindings.run-storage.username}"
            DAGSTER_POSTGRES_PASSWORD: "${bindings.run-storage.password}"
          healthcheck:
            conditionallyEnabledFrom: spec.config.healthcheck.enabled
            test:
              - CMD
              - python
              - -c
              - "import urllib.request; urllib.request.urlopen('http://localhost:${config.webPort}/')"
            interval: 10s
            timeout: 5s
            retries: 10

        dagster-daemon:
          enabledFrom: spec.config.daemon.enabled
          build:
            context: ../../../
            dockerfile: images/dagster/Dockerfile
          image: local/dagster:custom
          restart: on-failure
          depends_on:
            user-code:
              condition: service_healthy
          command:
            - dagster-daemon
            - run
          healthcheck:
            conditionallyEnabledFrom: spec.config.healthcheck.enabled
            test:
              - CMD
              - dagster
              - api
              - grpc-health-check
              - -h
              - dagster-user-code
              - -p
              - "4000"
            interval: 10s
            timeout: 2s
            start_period: 30s
            retries: 3
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - dagster-io-manager-storage:/tmp/io_manager_storage
          environment:
            DAGSTER_HOME: "${config.homeDir}"
            DAGSTER_POSTGRES_HOST: "${bindings.run-storage.host}"
            DAGSTER_POSTGRES_PORT: "${bindings.run-storage.port}"
            DAGSTER_POSTGRES_DB: "${bindings.run-storage.database}"
            DAGSTER_POSTGRES_USER: "${bindings.run-storage.username}"
            DAGSTER_POSTGRES_PASSWORD: "${bindings.run-storage.password}"

      volumes:
        dagster-io-manager-storage:
          enabledFrom: spec.config.storage.enabled
