# modules/secrets/vault/module.yaml
# yaml-language-server: $schema=../../../schemas/module.schema.json
apiVersion: cds/v1alpha1
kind: Module

metadata:
  name: vault
  category: secrets
  version: "0.1.0"
  displayName: Vault secrets provider
  description: >
    Secret provider module that can retrieve secrets from HashiCorp Vault.

spec:
  runtime:
    type: container
    service:
      name: secrets-vault
      ports: []

  configSchema:
    type: object
    additionalProperties: false
    required:
      - address
      - tokenFrom
      - mountPath
    properties:
      address:
        type: string
        minLength: 1
      tokenFrom:
        type: string
        pattern: "^secrets\\.[a-zA-Z0-9_-]+$"
      mountPath:
        type: string
        minLength: 1
        default: secret/data

  provides:
    - name: secrets-provider
      contract:
        kind: secrets-provider
        spec:
          provider: vault
          addressFrom: spec.config.address
          tokenFrom: spec.config.tokenFrom
          mountPathFrom: spec.config.mountPath

  implementation:
    kind: docker-compose
    compose: {}
