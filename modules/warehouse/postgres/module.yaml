# modules/warehouse/postgres/module.yaml
# yaml-language-server: $schema=../../../schemas/module.schema.json
apiVersion: cds/v1alpha1
kind: Module

metadata:
  name: postgres
  category: warehouse
  version: "0.1.0"
  displayName: PostgreSQL
  description: >
    PostgreSQL database module that provides a sql-database contract.

spec:
  runtime:
    type: container
    service:
      name: postgres
      ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
      networks:
        - default

  configSchema:
    type: object
    additionalProperties: false
    required:
      - database
      - username
      - passwordFrom
      - port
    properties:
      database:
        type: string
        minLength: 1

      username:
        type: string
        minLength: 1

      passwordFrom:
        type: string
        pattern: "^secrets\\.[a-zA-Z0-9_-]+$"

      superuserPasswordFrom:
        type: string
        pattern: "^secrets\\.[a-zA-Z0-9_-]+$"

      initDbEnv:
        type: object
        additionalProperties: true
        default: {}
        description: Additional environment variables to pass to the init-db script

      port:
        type: integer
        minimum: 1
        maximum: 65535
        default: 5432

      storage:
        type: object
        additionalProperties: false
        default: {}
        properties:
          enabled:
            type: boolean
            default: true
          size:
            type: string
            default: 5Gi

      initDbScript:
        type: string
        minLength: 1
        default: init-db.sql

      healthcheck:
        type: object
        additionalProperties: false
        default: {}
        properties:
          enabled:
            type: boolean
            default: true

      dagsterDatabase:
        type: object
        additionalProperties: false
        default: {}
        properties:
          name:
            type: string
            minLength: 1
            default: dagster
          username:
            type: string
            minLength: 1
            default: dagster
          passwordFrom:
            type: string
            pattern: "^secrets\\.[a-zA-Z0-9_-]+$"

      supersetDatabase:
        type: object
        additionalProperties: false
        default: {}
        properties:
          name:
            type: string
            minLength: 1
            default: superset
          username:
            type: string
            minLength: 1
            default: superset
          passwordFrom:
            type: string
            pattern: "^secrets\\.[a-zA-Z0-9_-]+$"

  provides:
    - name: sql-database
      contract:
        kind: sql-database
        spec:
          host: ${service.host}
          port: ${config.port}
          database: ${config.database}
          username: ${config.username}
          password: ${config.passwordFrom}
          connectionUri: postgresql://${config.username}:${config.passwordFrom}@${service.host}:${config.port}/${config.database}

    - name: dagster-database
      contract:
        kind: sql-database
        spec:
          host: ${service.host}
          port: ${config.port}
          database: ${config.dagsterDatabase.name}
          username: ${config.dagsterDatabase.username}
          password: ${config.dagsterDatabase.passwordFrom}
          connectionUri: postgresql://${config.dagsterDatabase.username}:${config.dagsterDatabase.passwordFrom}@${service.host}:${config.port}/${config.dagsterDatabase.name}

    - name: superset-database
      contract:
        kind: sql-database
        spec:
          host: ${service.host}
          port: ${config.port}
          database: ${config.supersetDatabase.name}
          username: ${config.supersetDatabase.username}
          password: ${config.supersetDatabase.passwordFrom}
          connectionUri: postgresql://${config.supersetDatabase.username}:${config.supersetDatabase.passwordFrom}@${service.host}:${config.port}/${config.supersetDatabase.name}
  implementation:
    kind: docker-compose
    compose:
      services:
        postgres:
          image: postgres:18
          hostname: "${service.host}"
          ports:
            - "${config.port}:5432"
          environment:
            POSTGRES_PASSWORD: "${config.superuserPasswordFrom}"
            POSTGRES_INITDB_ARGS: -U postgres --auth-local=password
            POSTGRES_DB: postgres
            POSTGRES_USER: postgres
          volumes:
            - type: bind
              source: "${config.initDbScript}"
              target: "/docker-entrypoint-initdb.d/${config.initDbScript}"
              read_only: true
            - postgres-data:/var/lib/postgresql
          healthcheck:
            conditionallyEnabledFrom: spec.config.healthcheck.enabled
            test:
              - CMD-SHELL
              - pg_isready -U postgres
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

      volumes:
        postgres-data:
          enabledFrom: spec.config.storage.enabled
