name: local-dagster-postgres-superset
services:
  postgres-postgres:
    image: postgres:18
    hostname: postgres
    ports:
    - 5432:5432
    environment:
      POSTGRES_INITDB_ARGS: -U postgres
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      DAGSTER_POSTGRES_PASSWORD: ${CDS_DAGSTER_POSTGRES_PASSWORD}
      SUPERSET_POSTGRES_PASSWORD: ${CDS_SUPERSET_POSTGRES_PASSWORD}
      ANALYTICS_POSTGRES_PASSWORD: ${CDS_ANALYTICS_POSTGRES_PASSWORD}
    volumes:
    - type: bind
      source: init-db.sh
      target: /docker-entrypoint-initdb.d/init-db.sh
      read_only: true
    - postgres-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U analytics -d analytics
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
    - cds-local
  dagster-user-code:
    build:
      context: ../..
      dockerfile: images/dagster/Dockerfile
    image: local/dagster:custom
    restart: always
    hostname: dagster-user-code
    command:
    - dagster
    - code-server
    - start
    - -h
    - 0.0.0.0
    - -p
    - '4000'
    - -f
    - /app/workdirs/dagster/definitions.py
    healthcheck:
      test:
      - CMD
      - dagster
      - api
      - grpc-health-check
      - -h
      - localhost
      - -p
      - '4000'
      interval: 10s
      timeout: 2s
      start_period: 30s
      retries: 3
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - dagster-dagster-io-manager-storage:/tmp/io_manager_storage
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_PORT: 5432
      DAGSTER_POSTGRES_DB: analytics
      DAGSTER_POSTGRES_USER: analytics
      DAGSTER_POSTGRES_PASSWORD: ${CDS_ANALYTICS_POSTGRES_PASSWORD}
      DAGSTER_CURRENT_IMAGE: local/dagster:custom
    networks:
    - cds-local
    depends_on:
      postgres-postgres:
        condition: service_started
  dagster-dagster-webserver:
    build:
      context: ../..
      dockerfile: images/dagster/Dockerfile
    image: local/dagster:custom
    restart: always
    depends_on:
      dagster-user-code:
        condition: service_healthy
      postgres-postgres:
        condition: service_started
    command:
    - dagster-webserver
    - -h
    - 0.0.0.0
    - -p
    - '3000'
    - -w
    - workspace.yaml
    ports:
    - 3000:3000
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - dagster-dagster-io-manager-storage:/tmp/io_manager_storage
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_PORT: 5432
      DAGSTER_POSTGRES_DB: analytics
      DAGSTER_POSTGRES_USER: analytics
      DAGSTER_POSTGRES_PASSWORD: ${CDS_ANALYTICS_POSTGRES_PASSWORD}
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:3000/')
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
    - cds-local
  dagster-dagster-daemon:
    build:
      context: ../..
      dockerfile: images/dagster/Dockerfile
    image: local/dagster:custom
    restart: on-failure
    depends_on:
      dagster-user-code:
        condition: service_healthy
      postgres-postgres:
        condition: service_started
    command:
    - dagster-daemon
    - run
    healthcheck:
      test:
      - CMD
      - dagster
      - api
      - grpc-health-check
      - -h
      - dagster-user-code
      - -p
      - '4000'
      interval: 10s
      timeout: 2s
      start_period: 30s
      retries: 3
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - dagster-dagster-io-manager-storage:/tmp/io_manager_storage
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_PORT: 5432
      DAGSTER_POSTGRES_DB: analytics
      DAGSTER_POSTGRES_USER: analytics
      DAGSTER_POSTGRES_PASSWORD: ${CDS_ANALYTICS_POSTGRES_PASSWORD}
    networks:
    - cds-local
  superset-superset:
    image: apache/superset:6.1.0
    ports:
    - 8088:8088
    environment:
      SUPERSET_SECRET_KEY: ${CDS_SUPERSET_SECRET_KEY}
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_PASSWORD: ${CDS_SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: admin@example.local
      SQLALCHEMY_DATABASE_URI: postgresql://analytics:${CDS_ANALYTICS_POSTGRES_PASSWORD}@postgres:5432/analytics
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8088/health')
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
    - cds-local
    depends_on:
      postgres-postgres:
        condition: service_started
volumes:
  postgres-postgres-data: {}
  dagster-dagster-io-manager-storage: {}
networks:
  cds-local:
    driver: bridge
