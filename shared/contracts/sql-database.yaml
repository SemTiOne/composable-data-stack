# yaml-language-server: $schema=../../schemas/contract.schema.json
apiVersion: cds/v1alpha1
kind: Contract

metadata:
  name: sql-database
  category: shared
  version: "0.1.0"
  description: Shared contract describing the values a SQL database provider exposes.

spec:
  fields:
    host:
      type: string
      required: true
      description: Hostname or service name clients use to connect.
    port:
      type: integer
      required: true
      description: TCP port where the database listens.
    database:
      type: string
      required: true
      description: Database name to connect to.
    username:
      type: string
      required: true
      description: Username for authentication.
    password:
      type: string
      required: true
      description: Secret reference or runtime placeholder for the password.
    connectionUri:
      type: string
      required: true
      description: Fully composed SQLAlchemy-style connection URI.
  examples:
    - host: postgres
      port: 5432
      database: analytics
      username: analytics
      password: ${CDS_ANALYTICS_DB_PASSWORD}
      connectionUri: postgresql://analytics:${CDS_ANALYTICS_DB_PASSWORD}@postgres:5432/analytics
