name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install YAML linter
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run Markdown lint
        run: |
          npx --yes markdownlint-cli@0.49.0 "**/*.md" ".github/**/*.md"

      - name: Run YAML lint
        run: |
          yamllint .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "*.py"

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build all Dockerfiles
        run: |
          for dockerfile in $(find . -name "Dockerfile" -type f); do
            dir=$(dirname "$dockerfile")
            echo "Building $dockerfile in directory $dir..."
            docker build -f "$dockerfile" "$dir" || exit 1
          done
