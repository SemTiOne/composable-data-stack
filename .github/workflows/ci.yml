name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Lint stays Linux-only: markdownlint and yamllint check file content, not
  # OS-dependent code paths, so running them on three OSes would triple CI
  # cost for zero extra signal.
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install YAML linter
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run Markdown lint
        run: |
          npx --yes markdownlint-cli@0.49.0 "**/*.md" ".github/**/*.md"

      - name: Run YAML lint
        run: |
          yamllint .

  # Core Python checks run on all three host OSes. This exercises unit tests
  # plus real `cds validate/plan/render` subprocess calls (see
  # tests/test_cds_workflow.py), catching cross-platform regressions in the
  # CLI itself, not just on Linux.
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      # Coverage is measured and gated once, on Linux, not per-OS: the same
      # test suite runs identical Python on all three OSes, so coverage %
      # wouldn't meaningfully differ, and running it three times would just
      # triple CI cost for the same signal (same tradeoff as the lint job
      # above). fail_under and source scoping are configured in
      # pyproject.toml under [tool.coverage.*].
      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run tests with coverage gate (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install .[dev]
          coverage run -m unittest discover -s tests -p "test_*.py" -v
          coverage report -m

  # Docker-heavy tasks stay Linux-only: Docker Desktop licensing and
  # significantly slower/less reliable Docker support on GitHub's hosted
  # macOS and Windows runners make this impractical to matrix. Local
  # Docker Desktop on macOS/Windows is unaffected by this CI limitation.
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build all Dockerfiles
        run: |
          for dockerfile in $(find . -name "Dockerfile*" -type f); do
            dir=$(dirname "$dockerfile")
            echo "Building $dockerfile in directory $dir..."
            context="$dir"
            if [ "$dockerfile" = "./images/dagster/Dockerfile" ] || [ "$dockerfile" = "./images/dagster/Dockerfile.user-code" ] || [ "$dockerfile" = "./images/superset/Dockerfile" ]; then
              context="."
            fi
            docker build -f "$dockerfile" "$context" || exit 1
          done
