name: Feature request
description: Suggest an improvement
labels:
- enhancement
body:
- type: markdown
  attributes:
    value: |
      Thanks for suggesting an improvement.

- type: input
  id: problem
  attributes:
    label: Problem statement
    description: What user problem does this solve?
    placeholder: I cannot reuse profile defaults across environments
  validations:
    required: true

- type: textarea
  id: proposal
  attributes:
    label: Proposed solution
    description: Describe what you want to happen
  validations:
    required: true

- type: textarea
  id: alternatives
  attributes:
    label: Alternatives considered
    description: Workarounds or alternative designs

- type: textarea
  id: impact
  attributes:
    label: Impact
    description: Affected users, modules, contracts, or workflows

- type: checkboxes
  id: checks
  attributes:
    label: Pre-submit checks
    options:
    - label: I searched existing issues and discussions
      required: true
