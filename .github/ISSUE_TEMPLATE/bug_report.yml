name: Bug Report
description: Report a bug to help us improve the composable data stack.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
- type: markdown
  attributes:
    value: |
      Thanks for reporting a bug! Please fill in as much detail as possible.

- type: input
  id: summary
  attributes:
    label: Summary
    description: One-line description of the problem.
    placeholder: e.g. cds render fails with unresolved contract ref
  validations:
    required: true

- type: dropdown
  id: severity
  attributes:
    label: Severity
    description: How severely does this bug affect you?
    options:
      - Critical (system unusable / data loss)
      - High (major feature broken)
      - Medium (feature partially broken)
      - Low (minor inconvenience)
  validations:
    required: true

- type: textarea
  id: repro
  attributes:
    label: Minimal Reproducible Example
    description: |
      Smallest possible steps or code snippet to reproduce the bug.
    placeholder: |
      1. Configure X with...
      2. Run command Y...
      3. See error Z
  validations:
    required: true

- type: textarea
  id: expected
  attributes:
    label: Expected behavior
  validations:
    required: true

- type: textarea
  id: actual
  attributes:
    label: Actual behavior and logs
    description: Include full error output and stack trace.
  validations:
    required: true

- type: input
  id: environment
  attributes:
    label: Environment
    description: OS, Python version, and how CDS was installed.
    placeholder: Linux, Python 3.11, pip install -e .
  validations:
    required: true

- type: checkboxes
  id: checks
  attributes:
    label: Pre-submit checks
    options:
    - label: I searched existing issues
      required: true
    - label: I removed sensitive information from logs
      required: true
