# yaml-language-server: $schema=../../../schemas/module.schema.json
apiVersion: cds/v1alpha1
kind: Module

metadata:
  name: airflow
  category: orchestration
  version: "0.1.0"
  displayName: Airflow (experimental)
  description: >
    Experimental Airflow module placeholder kept for future modernization.

spec:
  runtime:
    type: container
    service:
      name: airflow
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP

  configSchema:
    type: object
    additionalProperties: false
    properties:
      metadataDatabase:
        type: object
        additionalProperties: false
        required:
          - contractRef
        properties:
          contractRef:
            type: string
            pattern: "^[a-z0-9-]+\\.[a-z0-9-]+$"
      objectStore:
        type: object
        additionalProperties: false
        required:
          - contractRef
        properties:
          contractRef:
            type: string
            pattern: "^[a-z0-9-]+\\.[a-z0-9-]+$"
      secretsProvider:
        type: object
        additionalProperties: false
        required:
          - contractRef
        properties:
          contractRef:
            type: string
            pattern: "^[a-z0-9-]+\\.[a-z0-9-]+$"

  consumes:
    - name: metadata-database
      contract:
        kind: sql-database
      required: true
      mappedFrom: spec.config.metadataDatabase
    - name: object-store
      contract:
        kind: object-store
      required: false
      mappedFrom: spec.config.objectStore
    - name: secrets-provider
      contract:
        kind: secrets-provider
      required: true
      mappedFrom: spec.config.secretsProvider

  provides:
    - name: workflow-api
      contract:
        kind: http-service
        spec:
          port: 8080
          healthPath: /health
          protocol: http
    - name: scheduler
      contract:
        kind: scheduler
    - name: metadata-db-client
      contract:
        kind: metadata-db-client

  implementation:
    kind: docker-compose
    compose: {}
